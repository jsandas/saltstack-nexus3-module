services:
  salt-master:
    image: saltstack/salt:3006.5
    container_name: salt-master
    ports:
      - "4505:4505"
      - "4506:4506"
    environment: 
      SALT_MASTER_CONFIG: '{"auto_accept": true}'
    volumes:
      - ../../:/workspace
      - ./salt/nexus3:/srv/salt/nexus3
      - ../integration:/tests/integration

  salt-minion:
    image: saltstack/salt:3006.5
    container_name: salt-minion
    environment: 
      SALT_MINION_CONFIG: '{"id": "test.minion", "master": "salt-master", "log_level": "debug", "nexus3": {"hostname": "http://nexus3:8081", "username": "admin", "password": "${NEXUS_PASSWORD}"}}'
    volumes:
      - ../../:/workspace
    links:
      - salt-master:salt-master
      - nexus3:nexus3

  nexus3:
    image: sonatype/nexus3:latest
    container_name: nexus3
    ports:
      - "8081:8081"
      # - "5000:5000"
    # volumes:
    #   - ../../tests/files/nexus.properties:/nexus-data/etc/nexus.properties
    links:
      - minio:minio

  minio:
    image: minio/minio
    container_name: minio
    ports:
     - "9000:9000"
    environment:
      MINIO_ACCESS_KEY: AKIAIOSFODNN7EXAMPLE
      MINIO_SECRET_KEY: wJalrXUtnFEMIK7MDENGbPxRfiCYEXAMPLEKEY
    # volumes:
      # - ../../tests/data:/data
      # - ../../tests/files/config.json:/root/.mc/config.json
    command: server /data

  minio-mc:
    image: minio/mc
    container_name: minio-mc
    volumes:
      - ../../tests/files/minio-setup.sh:/root/minio-setup.sh
    entrypoint: /bin/sh
    command: -c '/root/minio-setup.sh'
    links:
      - minio:minio
