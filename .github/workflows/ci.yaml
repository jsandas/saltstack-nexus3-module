name: ci

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run lint
        run: nox -e lint

      - name: Run unit and functional tests
        run: nox -e tests

      - name: Validate changelog draft
        run: nox -e changelog

      - name: Build package
        run: python -m build --outdir dist
